name: AI PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Security: checkout merge commit, not the fork's HEAD directly
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install anthropic

      - name: Get diff
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          DIFF=$(git diff "$BASE_SHA"..HEAD \
            -- '*.py' '*.yaml' '*.yml' '*.xml' \
            '*.launch' '*.launch.py')
          DIFF_LINES=$(echo "$DIFF" | wc -l)
          echo "lines=$DIFF_LINES" >> "$GITHUB_OUTPUT"
          echo "$DIFF" > /tmp/pr_diff.txt

      - name: Check diff size
        id: size_check
        run: |
          if [ "${{ steps.diff.outputs.lines }}" -gt 500 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post warning for large PR
        if: steps.size_check.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## AI Review

          > **Warning**: この PR は変更行数が 500 行を超えています（${{ steps.diff.outputs.lines }} 行）。
          > PR を分割することを検討してください。AI レビューはスキップされました。"

      - name: Run AI review
        if: steps.size_check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          REVIEW=$(python scripts/review_pr.py /tmp/pr_diff.txt)
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$REVIEW"
