name: Lint

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  lint:
    name: lint (${{ matrix.ros_distribution }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ros_distribution: [humble]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Match ROS2 Humble / Ubuntu 22.04 system Python
          python-version: "3.10"

      - name: Install pre-commit and system tools
        run: |
          pip install pre-commit
          # xmllint is required by the local xmllint hook (validates package.xml, URDF/SDF)
          sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # TODO: Add ament_lint_cmake check here when CMakeLists.txt linting is needed.
      #       Would require ros-tooling/setup-ros and sourcing the ROS2 environment.
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Annotate ruff violations
        if: failure()
        run: pip install ruff && ruff check --output-format github . || true
