name: Merge Guard

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  check-labels:
    name: merge-guard
    runs-on: ubuntu-22.04
    steps:
      - name: do-not-merge ラベルチェック
        run: |
          if echo '${{ toJSON(github.event.pull_request.labels.*.name) }}' | grep -q 'do-not-merge'; then
            echo "::error::do-not-merge ラベルが付与されています。AI レビューの指摘を解消してください。"
            exit 1
          fi
          echo "マージブロックラベルなし — OK"
