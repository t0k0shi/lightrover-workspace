# ダッシュボードプロバイダー設定
#
# Grafana 起動時に grafana/dashboards/ 配下の JSON を自動ロードする。
# 手動インポート不要。（FR-014 AC-014-2）

apiVersion: 1

providers:
  - name: 'Lightrover Dashboards'
    orgId: 1
    folder: 'Lightrover'
    folderUid: 'lightrover'
    type: file
    disableDeletion: false
    # 30秒ごとにJSONの変更を検出して自動リロード（開発時に便利）
    updateIntervalSeconds: 30
    # UI からのダッシュボード編集を許可（管理者のみ。匿名Viewerは不可）
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
